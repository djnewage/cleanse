name: Build Windows

on:
  push:
    branches: [master, windows-changes]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Python venv and install backend deps
        shell: pwsh
        run: ./scripts/setup-python.ps1

      - name: Build Python backend (PyInstaller)
        shell: pwsh
        run: ./scripts/build-backend.ps1

      - name: Typecheck
        run: npm run typecheck

      - name: Build Electron app (Windows x64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cleanse-windows-x64
          path: |
            dist/*.exe
            dist/*.zip
            dist/latest.yml
          if-no-files-found: error
          retention-days: 7

      - name: Attach to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $files = @()
          $files += Get-ChildItem dist -Filter '*.exe'
          $files += Get-ChildItem dist -Filter '*.zip'
          $files += Get-ChildItem dist -Filter 'latest.yml'
          if ($files.Count -gt 0) {
            gh release upload $tag @($files | ForEach-Object { $_.FullName }) --clobber
          }
